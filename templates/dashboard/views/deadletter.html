<div class="flex flex-col gap-6">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">Dead Letter Queue</h3>
      <p class="card-description">Failed jobs awaiting replay or intervention</p>
    </div>
    <div class="card-content overflow-x-auto">
      <table class="table">
        <thead>
          <tr>
            <th>Job</th>
            <th>Queue</th>
            <th>Status</th>
            <th>Attempts</th>
            <th>Updated</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for job in jobs %}
          <tr hx-get="/inspect/job/{{ job.id }}" hx-target="#inspector-panel" hx-swap="innerHTML">
            <td class="font-mono text-sm">{{ job.id }}</td>
            <td>
              <span class="inline-flex px-2 py-1 rounded text-xs font-mono border" style="border-color: var(--border);">{{ job.queue }}</span>
            </td>
            <td>
              {% if job.status == "dead_letter" %}
              <span class="inline-flex justify-center px-3 py-1 rounded text-xs font-medium bg-orange-600 text-white min-w-[90px]">Dead Letter</span>
              {% else %}
              <span class="inline-flex justify-center px-3 py-1 rounded text-xs font-medium bg-red-600 text-white min-w-[90px]">{{ job.status }}</span>
              {% endif %}
            </td>
            <td class="text-sm" style="color: var(--muted-foreground);">{{ job.attempts }}</td>
            <td class="text-sm font-mono" style="color: var(--muted-foreground);">{{ job.updated_at }}</td>
            <td>
              <button
                class="btn btn-sm btn-outline"
                type="button"
                data-action-post="/action/scheduler/replay"
                data-action-body='{"job_id":"{{ job.id }}"}'
              >
                Replay
              </button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
