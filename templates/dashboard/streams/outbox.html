<div class="flex flex-col gap-1">
  {% for event in events %}
  <button class="flex items-center gap-3 px-4 py-3 text-left w-full rounded-lg transition-colors hover:bg-gray-50"
    type="button"
    hx-get="/inspect/event/{{ event.event_id }}" hx-target="#inspector-panel" hx-swap="innerHTML">
    {% if event.delivery_state == "published" %}
    <div class="status-dot status-healthy flex-shrink-0"></div>
    {% else if event.delivery_state == "pending" %}
    <div class="status-dot status-pending flex-shrink-0"></div>
    {% else %}
    <div class="status-dot status-offline flex-shrink-0"></div>
    {% endif %}
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between">
        <span class="text-xs font-mono font-medium truncate" style="color: var(--foreground);">{{ event.event_id }}</span>
        <span class="text-xs flex-shrink-0 ml-2" style="color: var(--muted-foreground);">{{ event.occurred_at }}</span>
      </div>
      <div class="text-xs mt-0.5" style="color: var(--muted-foreground);">{{ event.event_type }} &bull; {{ event.delivery_state }} &bull; retries {{ event.retry_attempts }}</div>
    </div>
  </button>
  {% endfor %}
</div>
