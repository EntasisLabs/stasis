[package]
name = "stasis"
version = "0.1.0"
edition = "2024"

[workspace]
members = [".", "medousa"]
resolver = "2"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
surrealdb = { version = "3", default-features = false, features = ["kv-surrealkv", "rustls", "kv-mem"] }
surrealdb-types = "3"
regex = "1"
sha2 = "0.10"
hex = "0.4"
locus-core-rs = "0.2.1"
locus-sdk = "0.1.1"
genai = "0.5.3"
async-trait = "0.1"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
cron = "0.12"
grapheme-sdk = "0.1.0"
futures-util = "0.3"